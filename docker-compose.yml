services:

  # Vue.js frontend
  frontend-alumni-media:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL}
        VITE_WS_URL: ${VITE_WS_URL}
    ports:
      - "4000:80"
    restart: always

  # Node.js sockets
  websocket-server:
    build: ./websocket-server
    ports:
      - "3000:3000"
    restart: always

  # Laravel backend
  backend-alumni-media:
    build: ./backend
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./backend:/var/www/html
    depends_on:
      - mysql-alumni-media
    networks:
      - laravel_network

  # Laravel Nginx Web Server
  laravel-webserver:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./backend:/var/www/html
      - ./backend/nginx.conf:/etc/nginx/conf.d/default.conf
    networks:
      - laravel_network
    depends_on:
      - backend-alumni-media

  # MySQL
  mysql-alumni-media:
    image: mysql:8
    restart: always
    environment:
      MYSQL_DATABASE: alumni_media_db
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
    - laravel_network

volumes:
  mysql-data:

# Docker networks
networks:
  laravel_network:
    driver: bridge
