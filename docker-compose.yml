services:
  mysql:
    image: mysql:8.4
    container_name: alumni_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: alumni_media_db
      MYSQL_USER: alumni_user
      MYSQL_PASSWORD: alumni_password
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u root -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      start_period: 40s
      retries: 20

  websocket-server:
    build:
      context: ./websocket-server
      dockerfile: Dockerfile
    container_name: alumni_websocket
    restart: unless-stopped
    ports:
      - "3000:3000"
      - "8081:8081"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: alumni_backend
    restart: unless-stopped
    env_file:
      - ./backend/.env.docker
    depends_on:
      mysql:
        condition: service_healthy
      websocket-server:
        condition: service_started
    ports:
      - "8000:8000"
    volumes:
      - backend_storage:/var/www/storage

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: alumni_frontend
    restart: unless-stopped
    env_file:
      - ./frontend/.env.docker
    depends_on:
      backend:
        condition: service_started
      websocket-server:
        condition: service_started
    ports:
      - "5173:5173"

volumes:
  mysql_data:
  backend_storage:
