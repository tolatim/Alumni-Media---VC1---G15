services:
  laravel-backend-alumni-media:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: laravel-backend-alumni-media
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
    networks:
      - laravel-network

  # Nginx Web Server
  laravel-nginx-alumni-media:
    image: nginx:alpine
    container_name: laravel-nginx-alumni-media
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./:/var/www
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    networks:
      - laravel-network

  # MySQL Database
  mysql-alumni-media:
    image: mysql:8.0
    container_name: mysql-alumni-media
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: alumni_media_db
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - dbdata:/var/lib/mysql
    networks:
      - laravel-network

networks:
  laravel-network:
    driver: bridge

volumes:
  dbdata:
